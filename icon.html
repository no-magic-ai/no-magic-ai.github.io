<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>no-magic icon — Deconstructed Bracket v3</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .canvas {
    width: 512px;
    height: 512px;
    position: relative;
    overflow: hidden;
    border-radius: 64px;
  }
</style>
</head>
<body>

<div class="canvas">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" id="icon">
    <defs>
      <!-- Glow for the incandescent core -->
      <radialGradient id="coreGlow" cx="0.62" cy="0.5" r="0.35" fx="0.58" fy="0.5">
        <stop offset="0%" stop-color="#fff8e1" stop-opacity="0.35"/>
        <stop offset="20%" stop-color="#ffab40" stop-opacity="0.25"/>
        <stop offset="50%" stop-color="#e94560" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
      </radialGradient>

      <!-- Bloom filter -->
      <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="12" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>

      <!-- Soft glow for left bracket -->
      <filter id="bracketGlow" x="-15%" y="-15%" width="130%" height="130%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>

      <!-- Glow for particles -->
      <filter id="particleGlow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>

    <!-- Background -->
    <rect width="512" height="512" fill="#0a1628" rx="64"/>

    <!-- Neural network graph background -->
    <g id="network" opacity="0.12"></g>

    <!-- Incandescent core glow -->
    <rect width="512" height="512" fill="url(#coreGlow)" rx="64"/>

    <!-- Left bracket — solid, stable -->
    <g filter="url(#bracketGlow)">
      <text
        x="128" y="256"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="280"
        font-weight="400"
        fill="#e94560"
        dominant-baseline="central"
        text-anchor="middle"
      >{</text>
    </g>

    <!-- Right bracket ghost (cracked, partially visible) -->
    <g id="bracketGhost"></g>

    <!-- Shatter fragments -->
    <g id="fragments"></g>

    <!-- Code particles (0, 1, a, #, >, etc.) -->
    <g id="codeParticles"></g>

    <!-- Hot glowing sparks at the core -->
    <g id="sparks" filter="url(#particleGlow)"></g>
  </svg>
</div>

<script>
  // Seeded PRNG
  let seed = 42;
  function rand() {
    seed = (seed * 16807 + 0) % 2147483647;
    return seed / 2147483647;
  }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function pick(arr) { return arr[Math.floor(rand() * arr.length)]; }

  const NS = 'http://www.w3.org/2000/svg';
  const CX = 330;   // center of right bracket
  const CY = 256;

  // ─── Neural network background ───
  const netG = document.getElementById('network');
  const nodes = [];
  for (let i = 0; i < 30; i++) {
    const x = rand() * 480 + 16;
    const y = rand() * 480 + 16;
    nodes.push({ x, y });
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', x);
    c.setAttribute('cy', y);
    c.setAttribute('r', rand() * 2 + 1);
    c.setAttribute('fill', '#4dd0e1');
    c.setAttribute('opacity', rand() * 0.6 + 0.3);
    netG.appendChild(c);
  }
  // Connect nearby nodes
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 160 && rand() < 0.5) {
        const l = document.createElementNS(NS, 'line');
        l.setAttribute('x1', nodes[i].x);
        l.setAttribute('y1', nodes[i].y);
        l.setAttribute('x2', nodes[j].x);
        l.setAttribute('y2', nodes[j].y);
        l.setAttribute('stroke', '#4dd0e1');
        l.setAttribute('stroke-width', '0.5');
        l.setAttribute('opacity', (1 - dist / 160) * 0.5);
        netG.appendChild(l);
      }
    }
  }

  // ─── Right bracket ghost (cracked appearance) ───
  const ghostG = document.getElementById('bracketGhost');
  // Draw the } as multiple broken segments using clip paths simulated by rectangles
  const ghostText = document.createElementNS(NS, 'text');
  ghostText.setAttribute('x', CX);
  ghostText.setAttribute('y', CY);
  ghostText.setAttribute('font-family', "Georgia, 'Times New Roman', serif");
  ghostText.setAttribute('font-size', '280');
  ghostText.setAttribute('font-weight', '400');
  ghostText.setAttribute('fill', '#e94560');
  ghostText.setAttribute('opacity', '0.3');
  ghostText.setAttribute('dominant-baseline', 'central');
  ghostText.setAttribute('text-anchor', 'middle');
  ghostText.textContent = '}';
  ghostG.appendChild(ghostText);

  // ─── Color helpers for the gradient effect ───
  // distNorm: 0 = at bracket, 1 = at right edge
  function fragColor(distNorm) {
    if (distNorm < 0.25) return '#e94560';
    if (distNorm < 0.45) return pick(['#e94560', '#ef6c35', '#f08030']);
    if (distNorm < 0.65) return pick(['#ef6c35', '#f08030', '#f5a623', '#ffab40']);
    if (distNorm < 0.8) return pick(['#f5a623', '#ffab40', '#ffd54f', '#ffe082']);
    return pick(['#ffd54f', '#ffe082', '#fff8e1', '#ffffff']);
  }

  // All fragments flow RIGHTWARD from the bracket body.
  // Fragments originate from the full height of the } bracket (~120 to ~392)
  // and fan out further as they travel right. Density is highest at vertical
  // center and tapers toward top/bottom (gaussian-like distribution).
  const EDGE = 510;
  const BRACKET_LEFT = CX - 25;
  const BRACKET_TOP = 120;     // top of the } bracket
  const BRACKET_BOT = 392;     // bottom of the } bracket
  const BRACKET_H = BRACKET_BOT - BRACKET_TOP;

  // Approximate gaussian: sum of multiple uniform randoms → bell curve
  function gaussRand() {
    return (rand() + rand() + rand()) / 3;  // centered ~0.5, tighter than uniform
  }

  function makeFragment(group, xOff, ySpread, wRange, hRange, opRange) {
    // xOff: 0..1 how far rightward (0 = at bracket, 1 = at edge)
    const x = lerp(BRACKET_LEFT, EDGE, xOff) + (rand() - 0.5) * 15;

    // Origin spans full bracket height, gaussian-weighted toward center
    const bracketY = BRACKET_TOP + gaussRand() * BRACKET_H;
    // Add drift/spread that grows with distance
    const drift = (rand() - 0.5) * ySpread * xOff * 2;
    const y = bracketY + drift;
    const w = rand() * (wRange[1] - wRange[0]) + wRange[0];
    const h = rand() * (hRange[1] - hRange[0]) + hRange[0];
    const rot = (rand() - 0.5) * 120;
    const opacity = lerp(opRange[0], opRange[1], xOff) + (rand() - 0.5) * 0.08;

    if (y < 20 || y > 492) return;

    const r = document.createElementNS(NS, 'rect');
    r.setAttribute('x', x);
    r.setAttribute('y', y);
    r.setAttribute('width', Math.max(w, 1));
    r.setAttribute('height', Math.max(h, 1));
    r.setAttribute('fill', fragColor(xOff));
    r.setAttribute('opacity', Math.min(Math.max(opacity, 0.03), 1));
    r.setAttribute('transform', `rotate(${rot} ${x + w/2} ${y + h/2})`);
    group.appendChild(r);
  }

  const fragG = document.getElementById('fragments');

  // Layer 1: Large structural chunks — close to bracket, barely detached
  for (let i = 0; i < 50; i++) {
    const xOff = rand() * 0.2;          // 0-20% rightward
    makeFragment(fragG, xOff, 90 + xOff * 40, [8, 22], [6, 24], [0.65, 0.4]);
  }

  // Layer 2: Medium fragments — mid-flight
  for (let i = 0; i < 110; i++) {
    const xOff = rand() * 0.45 + 0.1;   // 10-55% rightward
    makeFragment(fragG, xOff, 100 + xOff * 60, [4, 12], [3, 12], [0.6, 0.15]);
  }

  // Layer 3: Small fragments — further out, fading to gold
  for (let i = 0; i < 140; i++) {
    const xOff = rand() * 0.45 + 0.35;  // 35-80% rightward
    makeFragment(fragG, xOff, 80 + xOff * 80, [2, 7], [1.5, 6], [0.45, 0.08]);
  }

  // Layer 4: Pixel dust — outermost, hitting the edge
  for (let i = 0; i < 100; i++) {
    const xOff = rand() * 0.35 + 0.65;  // 65-100% rightward
    makeFragment(fragG, xOff, 60 + xOff * 60, [1, 3.5], [0.8, 3], [0.2, 0.03]);
  }

  // ─── Code particles (0, 1, a, #, >, x, {, }) ───
  const codeG = document.getElementById('codeParticles');
  const chars = ['0', '1', '0', '1', '0', '1', 'a', '#', '>', 'x', '{', '}', '0', '1', '=', '+'];

  for (let i = 0; i < 75; i++) {
    const xOff = rand() * 0.85 + 0.1;  // 10-95% rightward
    const x = lerp(BRACKET_LEFT, EDGE, xOff) + (rand() - 0.5) * 20;
    const bracketY = BRACKET_TOP + gaussRand() * BRACKET_H;
    const drift = (rand() - 0.5) * 80 * xOff * 2;
    const y = bracketY + drift;
    const size = lerp(12, 5, xOff) + (rand() - 0.5) * 2;
    const opacity = lerp(0.55, 0.06, xOff) + (rand() - 0.5) * 0.08;
    const rot = (rand() - 0.5) * 50;

    if (x < 20 || x > 505 || y < 25 || y > 490) continue;

    const t = document.createElementNS(NS, 'text');
    t.setAttribute('x', x);
    t.setAttribute('y', y);
    t.setAttribute('font-family', "'Courier New', monospace");
    t.setAttribute('font-size', Math.max(size, 5));
    t.setAttribute('font-weight', rand() < 0.3 ? '700' : '400');
    t.setAttribute('fill', fragColor(xOff));
    t.setAttribute('opacity', Math.min(Math.max(opacity, 0.04), 1));
    t.setAttribute('transform', `rotate(${rot} ${x} ${y})`);
    t.textContent = pick(chars);
    codeG.appendChild(t);
  }

  // ─── Hot sparks at the core (bright, glowing dots near bracket) ───
  const sparkG = document.getElementById('sparks');
  for (let i = 0; i < 30; i++) {
    const xOff = rand() * 0.3;
    const x = lerp(BRACKET_LEFT, EDGE, xOff);
    const y = BRACKET_TOP + gaussRand() * BRACKET_H + (rand() - 0.5) * 30;
    const r = rand() * 2.5 + 1;
    const opacity = rand() * 0.5 + 0.35;

    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('cx', x);
    c.setAttribute('cy', y);
    c.setAttribute('r', r);
    c.setAttribute('fill', pick(['#fff8e1', '#ffe082', '#ffab40', '#ffffff']));
    c.setAttribute('opacity', opacity);
    sparkG.appendChild(c);
  }
</script>

</body>
</html>
