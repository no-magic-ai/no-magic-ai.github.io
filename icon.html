<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>no-magic icon — Deconstructed Bracket</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    gap: 3rem;
    flex-wrap: wrap;
    padding: 2rem;
  }

  .canvas {
    width: 512px;
    height: 512px;
    position: relative;
    overflow: hidden;
    border-radius: 64px;
  }
</style>
</head>
<body>

<div class="canvas">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" id="icon">
    <defs>
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>

    <!-- Background — dark navy matching reference -->
    <rect width="512" height="512" fill="#141a2e" rx="64"/>

    <!-- Left bracket { — serif style, solid, intact -->
    <g filter="url(#glow)">
      <text
        x="135" y="256"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="300"
        font-weight="400"
        fill="#e9556a"
        dominant-baseline="central"
        text-anchor="middle"
      >{</text>
    </g>

    <!-- Right bracket fragments generated by script below -->
    <g id="fragments"></g>
  </svg>
</div>

<script>
  // Procedurally generate the shattered right bracket
  const frag = document.getElementById('fragments');
  const svg = document.getElementById('icon');

  // Seeded PRNG for reproducible output
  let seed = 42;
  function rand() {
    seed = (seed * 16807 + 0) % 2147483647;
    return seed / 2147483647;
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  const COLOR = '#e9556a';
  const CX = 340;  // center x of where the } would be
  const CY = 256;  // center y

  // Draw a faint ghost of the } bracket (barely visible, 12% opacity)
  const ghost = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  ghost.setAttribute('x', CX);
  ghost.setAttribute('y', CY);
  ghost.setAttribute('font-family', "Georgia, 'Times New Roman', serif");
  ghost.setAttribute('font-size', '300');
  ghost.setAttribute('font-weight', '400');
  ghost.setAttribute('fill', COLOR);
  ghost.setAttribute('opacity', '0.1');
  ghost.setAttribute('dominant-baseline', 'central');
  ghost.setAttribute('text-anchor', 'middle');
  ghost.textContent = '}';
  frag.appendChild(ghost);

  // Large structural chunks — retain parts of the bracket shape
  // These are bigger, closer to center, higher opacity
  const largeChunks = 35;
  for (let i = 0; i < largeChunks; i++) {
    const angle = (rand() - 0.5) * Math.PI * 1.4; // spread mostly rightward
    const dist = rand() * 60 + 10;
    const x = CX + Math.cos(angle) * dist + (rand() - 0.3) * 40;
    const y = CY + Math.sin(angle) * dist + (rand() - 0.5) * 140;
    const w = rand() * 18 + 8;
    const h = rand() * 22 + 6;
    const rot = (rand() - 0.5) * 90;
    const opacity = rand() * 0.4 + 0.5;

    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('x', x);
    r.setAttribute('y', y);
    r.setAttribute('width', w);
    r.setAttribute('height', h);
    r.setAttribute('fill', COLOR);
    r.setAttribute('opacity', opacity);
    r.setAttribute('rx', rand() < 0.3 ? '1' : '0');
    r.setAttribute('transform', `rotate(${rot} ${x + w/2} ${y + h/2})`);
    frag.appendChild(r);
  }

  // Medium fragments — dispersing outward
  const medFragments = 80;
  for (let i = 0; i < medFragments; i++) {
    const angle = (rand() - 0.4) * Math.PI * 1.6;
    const dist = rand() * 100 + 40;
    const x = CX + Math.cos(angle) * dist + (rand() - 0.3) * 30;
    const y = CY + Math.sin(angle) * dist + (rand() - 0.5) * 120;
    const size = rand() * 10 + 4;
    const w = size * (0.5 + rand());
    const h = size * (0.5 + rand());
    const rot = (rand() - 0.5) * 120;
    const distNorm = dist / 140;
    const opacity = lerp(0.6, 0.2, distNorm) + (rand() - 0.5) * 0.15;

    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('x', x);
    r.setAttribute('y', y);
    r.setAttribute('width', Math.max(w, 2));
    r.setAttribute('height', Math.max(h, 2));
    r.setAttribute('fill', COLOR);
    r.setAttribute('opacity', Math.max(opacity, 0.08));
    r.setAttribute('transform', `rotate(${rot} ${x + w/2} ${y + h/2})`);
    frag.appendChild(r);
  }

  // Small fragments — further out, fading
  const smallFragments = 120;
  for (let i = 0; i < smallFragments; i++) {
    const angle = (rand() - 0.35) * Math.PI * 1.8;
    const dist = rand() * 130 + 60;
    const x = CX + Math.cos(angle) * dist + (rand() - 0.3) * 50;
    const y = CY + Math.sin(angle) * dist + (rand() - 0.5) * 140;
    const size = rand() * 6 + 2;
    const w = size;
    const h = size * (0.4 + rand() * 0.8);
    const rot = rand() * 360;
    const distNorm = dist / 190;
    const opacity = lerp(0.4, 0.08, distNorm) + (rand() - 0.5) * 0.1;

    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('x', x);
    r.setAttribute('y', y);
    r.setAttribute('width', Math.max(w, 1.5));
    r.setAttribute('height', Math.max(h, 1.5));
    r.setAttribute('fill', COLOR);
    r.setAttribute('opacity', Math.max(opacity, 0.05));
    r.setAttribute('transform', `rotate(${rot} ${x + w/2} ${y + h/2})`);
    frag.appendChild(r);
  }

  // Tiny pixel dust — outermost ring
  const dustCount = 80;
  for (let i = 0; i < dustCount; i++) {
    const angle = (rand() - 0.3) * Math.PI * 2;
    const dist = rand() * 80 + 120;
    const x = CX + Math.cos(angle) * dist + (rand() - 0.3) * 40;
    const y = CY + Math.sin(angle) * dist + (rand() - 0.5) * 100;
    const size = rand() * 3 + 1;
    const rot = rand() * 360;
    const opacity = rand() * 0.12 + 0.03;

    // Skip if outside visible area
    if (x < 10 || x > 500 || y < 30 || y > 480) continue;

    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('x', x);
    r.setAttribute('y', y);
    r.setAttribute('width', size);
    r.setAttribute('height', size);
    r.setAttribute('fill', COLOR);
    r.setAttribute('opacity', opacity);
    r.setAttribute('transform', `rotate(${rot} ${x + size/2} ${y + size/2})`);
    frag.appendChild(r);
  }
</script>

</body>
</html>
